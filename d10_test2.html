<!DOCTYPE html>
<html>
<body>
<svg width="200" height="200" viewBox="0 0 200 200">
  <polygon points="100,10 180,80 100,190 20,80" fill="none" stroke="black" stroke-width="2"/>
  
  <!-- Equator -->
  <polyline points="20,80 60,110 100,80 140,110 180,80" fill="none" stroke="black" stroke-width="2"/>
  
  <!-- Top connections -->
  <line x1="100" y1="10" x2="100" y2="80" stroke="black" stroke-width="2"/>
  
  <!-- Bottom connections -->
  <line x1="100" y1="190" x2="60" y2="110" stroke="black" stroke-width="2"/>
  <line x1="100" y1="190" x2="140" y2="110" stroke="black" stroke-width="2"/>
</svg>
</body>
</html>
