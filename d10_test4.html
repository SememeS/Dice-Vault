<!DOCTYPE html>
<html>
<body>
<svg width="200" height="200" viewBox="0 0 200 200">
  <polygon points="100,10 180,90 100,190 20,90" fill="none" stroke="black" stroke-width="2"/>
  
  <!-- Zigzag -->
  <polyline points="20,90 60,110 100,90 140,110 180,90" fill="none" stroke="black" stroke-width="2"/>
  
  <!-- Top to Center -->
  <line x1="100" y1="10" x2="100" y2="90" stroke="black" stroke-width="2"/>
  
  <!-- Bottom to P1 and P2 -->
  <line x1="100" y1="190" x2="60" y2="110" stroke="black" stroke-width="2"/>
  <line x1="100" y1="190" x2="140" y2="110" stroke="black" stroke-width="2"/>
</svg>
</body>
</html>
